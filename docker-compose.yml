name: billiards-prod

services:
  billiards-ui-prod:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: billiards-ui-prod
    ports:
      - "8080:80"
    environment:
      - PORT=80
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://localhost:3000/api/v1
      - HOST=0.0.0.0
    restart: unless-stopped
    # env_file:
    #   - .env.prod
